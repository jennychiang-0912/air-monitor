<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>即時空氣品質監測系統</h1>
    <p class="subtitle">Arduino + Web Serial 即時監測</p>

    <div class="top-bar">
      <button id="connectBtn">連接 Arduino</button>
      <span id="status">尚未連接</span>
    </div>

    <div class="card-grid">
      <div class="card">
        <h2>時間</h2>
        <small>目前感測時間</small>
        <p id="timeValue">--</p>
      </div>

      <div class="card">
        <h2>一氧化碳（CO）</h2>
        <small>由 MQ-7 感測器測得</small>
        <p id="mq7Value" class="value">--</p>
      </div>

      <div class="card">
        <h2>粉塵濃度</h2>
        <small>空氣中懸浮粒子變化</small>
        <p id="dustValue" class="value">--</p>
      </div>

      <div class="card">
        <h2>二氧化碳（CO₂）</h2>
        <small>由 CCS811 感測器測得</small>
        <p id="co2Value" class="value">--</p>
      </div>

      <div class="card">
        <h2>揮發性有機物（TVOC）</h2>
        <small>空氣中氣體污染程度</small>
        <p id="tvocValue" class="value">--</p>
      </div>
    </div>

    <div class="card">
      <h2>最近收到的原始資料</h2>
      <pre id="rawData">等待資料中...</pre>
    </div>

    <div class="card">
      <h2>一氧化碳（CO）每分鐘變化</h2>
      <canvas id="mq7Chart"></canvas>
    </div>

    <div class="card">
      <h2>粉塵濃度每分鐘變化</h2>
      <canvas id="dustChart"></canvas>
    </div>

    <div class="card">
      <h2>二氧化碳（CO₂）每分鐘變化</h2>
      <canvas id="co2Chart"></canvas>
    </div>

    <div class="card">
      <h2>揮發性有機物（TVOC）每分鐘變化</h2>
      <canvas id="tvocChart"></canvas>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
