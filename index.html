<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即時空氣品質監測系統</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
<div class="container">

<header class="header-row">
  <div>
    <h1>即時空氣品質監測系統</h1>
    <p class="subtitle">Arduino + Web Serial 即時監測</p>
  </div>
  <div id="timeValue" class="time-display">--</div>
</header>

<section class="top-bar">
  <button id="connectBtn">連接 Arduino</button>
  <span id="status">尚未連接</span>
</section>

<section class="card-grid">
  <div class="card">
    <h2>一氧化碳（CO）</h2>
    <p id="mq7Value" class="value">--</p>
  </div>

  <div class="card">
    <h2>粉塵濃度</h2>
    <p id="dustValue" class="value">--</p>
  </div>

  <div class="card">
    <h2>二氧化碳（CO₂）</h2>
    <p id="co2Value" class="value">--</p>
  </div>

  <div class="card">
    <h2>TVOC</h2>
    <p id="tvocValue" class="value">--</p>
  </div>

  <div class="card">
    <h2>AQI</h2>
    <p id="aqiValue" class="value">--</p>
  </div>
</section>

<section class="card chart-card">
  <div class="chart-header">
    <h2 id="chartTitle">每分鐘變化</h2>
    <select id="chartSelector">
      <option value="co2">CO₂</option>
      <option value="mq7">CO</option>
      <option value="dust">Dust</option>
      <option value="tvoc">TVOC</option>
      <option value="aqi">AQI</option>
    </select>
  </div>
  <canvas id="mainChart"></canvas>
</section>

<section class="card chart-card">
  <div class="chart-header">
    <h2 id="hourChartTitle">每小時平均</h2>
    <select id="hourChartSelector">
      <option value="co2">CO₂</option>
      <option value="mq7">CO</option>
      <option value="dust">Dust</option>
      <option value="tvoc">TVOC</option>
      <option value="aqi">AQI</option>
    </select>
  </div>
  <canvas id="hourChart"></canvas>
</section>

</div>
<script src="app.js?v=10"></script>
</body>
</html>
