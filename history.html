<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歷史資料查詢</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>歷史資料查詢</h1>

  <div class="top-bar">
    <button id="connectBtn">連接 Arduino</button>
    <span id="status">尚未連接</span>
  </div>

  <div class="card">
    <h2>查詢條件</h2>
    <small>格式：YYYY/MM/DD HH</small>

    <div class="query-row">
      <input id="startTime" placeholder="開始：2026/03/22 10">
      <input id="endTime" placeholder="結束：2026/03/22 14">
    </div>

    <div class="btn-row">
      <button id="queryBtn">查詢資料</button>
      <button id="exportBtn">下載全部 CSV</button>
      <button id="clearBtn">清除資料</button>
    </div>
  </div>

  <div class="card">
    <h2>查詢結果</h2>
    <pre id="output">尚未查詢</pre>
  </div>

</div>

<script src="history.js"></script>
</body>
</html>
